version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: moov
      POSTGRES_PASSWORD: password
      POSTGRES_DB: moovchat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:latest
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=moov
      - DB_POSTGRESDB_PASSWORD=password
      - N8N_ENCRYPTION_KEY=mude-esta-chave-32chars-minimo
      - WEBHOOK_URL=http://localhost:5678
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres

  evolution:
    image: atendai/evolution-api:latest
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=seu-token-global-aqui
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=postgresql://moov:password@postgres:5432/evolution
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  n8n_data:
