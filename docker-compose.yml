# docker-compose.yml — Serviços da VPS Hostinger
# Banco de dados: Supabase (externo) — não inclui postgres aqui
version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      # n8n usa o Supabase como banco próprio (banco separado "n8n" no Supabase)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${N8N_DB_HOST}
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${N8N_DB_USER}
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_API_KEY=${N8N_API_KEY}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

  evolution:
    image: atendai/evolution-api:latest
    restart: unless-stopped
    environment:
      - SERVER_URL=${EVOLUTION_API_URL}
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_GLOBAL_TOKEN}
      - DATABASE_ENABLED=true
      # Evolution também usa o Supabase (banco separado "evolution")
      - DATABASE_CONNECTION_URI=${EVOLUTION_DB_URI}
    ports:
      - "8080:8080"

volumes:
  n8n_data:
